# ─────────────────────────────────────────────────────────────────────────────
#  nginx-proxy.conf  –  port 9090
#  "A dumb enterprise proxy in the way"
#
#  Serves the same demo frontend but forwards /lightstreamer/* through an
#  HTTP/1.0, response-buffering proxy that BREAKS streaming connections.
#
#  Lightstreamer client detects that streaming isn't delivering data (the
#  "probe" message gets held in the proxy buffer) and automatically falls back:
#    1. WebSocket   → blocked (no Upgrade forwarding)
#    2. HTTP-Streaming → blocked (large buffers hold data back)
#    3. HTTP Long Polling → WORKS  (CONNECTED:HTTP-POLLING)
#
#  No code change is needed in the client or server — transport negotiation
#  is automatic.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;

    # ── Serve the frontend SPA (identical to direct) ─────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse-proxy to Lightstreamer Server (streaming-hostile) ────────────
    location /lightstreamer/ {
        proxy_pass http://ls-server:8080/lightstreamer/;

        # HTTP/1.0 – no chunked transfer encoding, no keep-alive by default
        proxy_http_version 1.0;

        # Strip WebSocket upgrade headers (blocks WS completely)
        proxy_set_header Upgrade   "";
        proxy_set_header Connection "close";
        proxy_set_header Host      $host;

        # !! Enable aggressive response buffering – this is the key setting.
        #    The proxy accumulates the full response before forwarding it,
        #    which breaks SSE because events never arrive incrementally.
        proxy_buffering        on;
        proxy_buffer_size      1m;
        proxy_buffers          8 1m;
        proxy_busy_buffers_size 2m;

        # Short idle timeout – long-lived streaming connections get killed,
        # forcing the LS client to detect the failure and retry with polling.
        proxy_read_timeout  12s;
        proxy_send_timeout  12s;

        # Suppress the "no-buffer" hint so downstream can't override buffering
        proxy_hide_header X-Accel-Buffering;
    }
}
