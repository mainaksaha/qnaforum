# ─────────────────────────────────────────────────────────────────────────────
#  nginx-direct.conf  –  port 3000
#  "No proxy in the way"
#
#  Serves the demo frontend AND forwards /lightstreamer/* to the LS server
#  WITHOUT buffering.  This allows WebSocket streaming and HTTP-Streaming (SSE)
#  to work end-to-end.
#
#  Lightstreamer client will negotiate the best available transport:
#    1. WebSocket Streaming   (CONNECTED:WS-STREAMING)
#    2. HTTP Streaming / SSE  (CONNECTED:HTTP-STREAMING)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;

    # ── Serve the frontend SPA ───────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse-proxy to Lightstreamer Server (streaming-friendly) ───────────
    location /lightstreamer/ {
        proxy_pass http://ls-server:8080/lightstreamer/;

        # HTTP/1.1 + Connection upgrade support (needed for WebSocket)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;

        # !! Disable all buffering so SSE/streaming data is forwarded instantly
        proxy_buffering    off;
        proxy_cache        off;

        # Allow long-lived connections (streaming sessions can last hours)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        # Propagate the LS "no-buffer" hint downstream if present
        proxy_pass_header   X-Accel-Buffering;
    }
}
